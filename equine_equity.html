<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equine Equity</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f5dc; /* Cream color background */
            margin: 0;
            padding: 0;
        }
        h1, h2, h3 {
            font-family: 'Georgia', serif;
            color: #8B4513; /* Saddle Brown */
        }
        header {
            background-color: #8B4513; /* Saddle Brown */
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            color: #8B4513;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        section {
            margin: 20px;
            padding: 15px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #8B4513;
            color: white;
        }
        .calculator {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .calculator input {
            width: 80px;
            text-align: center;
            margin-right: 10px;
        }
        .button {
            background-color: #8B4513;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #a0522d;
        }
    </style>
</head>
<body>
    <header>
        <h1>Equine Equity</h1>
        <nav>
            <a href="#about">About</a>
            <a href="#services">Services</a>
            <a href="#calculator">Horse Shares Calculator</a>
        </nav>
    </header>
    <section id="about">
        <h2>About Us</h2>
        <p>We provide insights into the equine market...</p>
    </section>
    <section id="services">
        <h2>Our Services</h2>
        <p>Offering expert advice on horse ownership...</p>
    </section>
    <section id="calculator">
        <h2>Horse Shares Calculator</h2>
        <div class="calculator">
            <input type="number" id="value" value="75000" />
            <select id="sharePercent">
                <option value="1">1%</option>
                <option value="2">2%</option>
                <option value="3">3%</option>
                <option value="5">5%</option>
                <option value="10">10%</option>
                <option value="25">25%</option>
                <option value="50">50%</option>
            </select>
            <button class="button" onclick="calculateShares()">Calculate</button>
        </div>
        <p id="result"></p>
        <script>
            function calculateShares() {
                var value = document.getElementById('value').value;
                var sharePercent = document.getElementById('sharePercent').value;
                var result = (value * sharePercent / 100).toFixed(2);
                document.getElementById('result').innerText = 'Share Value: $' + result;
            }
        </script>
    </section>
    <footer>
        <p>&copy; 2026 Equine Equity. All rights reserved.</p>
    </footer>
</body>
</html>
