<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Equine Equity</title>\n</head>\n<body>\n    <h1>Equine Equity</h1>\n    <div>\n        <label for="horseValue">Enter Horse Value:</label>\n        <input type="number" id="horseValue" placeholder="Enter value" oninput="calculateShares()">\n    </div>\n    <div id="sharesSection">\n        <h2>Shares</h2>\n        <p>1%: <span id="share1"></span></p>\n        <p>2%: <span id="share2"></span></p>\n        <p>3%: <span id="share3"></span></p>\n        <p>5%: <span id="share5"></span></p>\n        <p>10%: <span id="share10"></span></p>\n        <p>25%: <span id="share25"></span></p>\n        <p>50%: <span id="share50"></span></p>\n    </div>\n    <script>\n        function calculateShares() {\n            const value = parseFloat(document.getElementById('horseValue').value);\n            if (isNaN(value)) return;\n            document.getElementById('share1').innerText = (value * 0.01).toFixed(2);\n            document.getElementById('share2').innerText = (value * 0.02).toFixed(2);\n            document.getElementById('share3').innerText = (value * 0.03).toFixed(2);\n            document.getElementById('share5').innerText = (value * 0.05).toFixed(2);\n            document.getElementById('share10').innerText = (value * 0.10).toFixed(2);\n            document.getElementById('share25').innerText = (value * 0.25).toFixed(2);\n            document.getElementById('share50').innerText = (value * 0.50).toFixed(2);\n        }\n    <\/script>\n</body>\n</html>
